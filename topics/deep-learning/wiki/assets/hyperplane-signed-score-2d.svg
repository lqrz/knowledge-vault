<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Signed score for a 2D hyperplane</title>
  <desc id="desc">A vertical hyperplane x equals 2 separates points with positive, zero, and negative signed scores.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="760" height="420" fill="#ffffff" />
  <g transform="translate(90 330)">
    <line x1="0" y1="0" x2="580" y2="0" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
    <line x1="0" y1="0" x2="0" y2="-260" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
    <text x="590" y="6" font-family="Arial, sans-serif" font-size="18" fill="#111827">x</text>
    <text x="-7" y="-275" font-family="Arial, sans-serif" font-size="18" fill="#111827">y</text>

    <line x1="300" y1="30" x2="300" y2="-280" stroke="#111827" stroke-width="4" />
    <text x="265" y="-292" font-family="Arial, sans-serif" font-size="18" fill="#111827">x = 2</text>
    <text x="232" y="-268" font-family="Arial, sans-serif" font-size="16" fill="#374151">w · x + b = 0</text>

    <rect x="0" y="-250" width="300" height="250" fill="#fef2f2" opacity="0.7" />
    <rect x="300" y="-250" width="280" height="250" fill="#eff6ff" opacity="0.75" />
    <text x="78" y="-214" font-family="Arial, sans-serif" font-size="18" fill="#991b1b">negative side</text>
    <text x="404" y="-214" font-family="Arial, sans-serif" font-size="18" fill="#1d4ed8">positive side</text>
    <text x="88" y="-188" font-family="Arial, sans-serif" font-size="16" fill="#991b1b">w · x + b &lt; 0</text>
    <text x="414" y="-188" font-family="Arial, sans-serif" font-size="16" fill="#1d4ed8">w · x + b &gt; 0</text>

    <line x1="300" y1="-95" x2="405" y2="-95" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)" />
    <text x="342" y="-112" font-family="Arial, sans-serif" font-size="18" fill="#2563eb">w</text>

    <circle cx="420" cy="-65" r="8" fill="#2563eb" />
    <text x="435" y="-60" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">s &gt; 0</text>

    <circle cx="300" cy="-130" r="8" fill="#111827" />
    <text x="315" y="-126" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">s = 0</text>

    <circle cx="190" cy="-90" r="8" fill="#dc2626" />
    <text x="205" y="-85" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">s &lt; 0</text>

    <text x="155" y="48" font-family="Arial, sans-serif" font-size="18" fill="#111827">s = w · x + b</text>
    <text x="155" y="74" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">The sign of s tells which side of the boundary the point is on.</text>
  </g>
</svg>
