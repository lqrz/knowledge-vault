<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="420" viewBox="0 0 1040 420" role="img" aria-labelledby="title desc">
  <title id="title">GRU update gate interpolation</title>
  <desc id="desc">The GRU update gate interpolates between keeping the old memory and writing a candidate memory.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect width="1040" height="420" fill="#ffffff"/>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">GRU update gate: keep old memory or write candidate memory</text>
  <text x="40" y="74" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">The update gate gamma_u is a vector of values between 0 and 1.</text>
  <text x="40" y="96" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">Each dimension blends old memory with candidate memory.</text>

  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="82" y="150" width="170" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="167" y="178" font-size="18" fill="#111827">old memory</text>
    <text x="167" y="204" font-size="20" fill="#111827">c_prev</text>

    <rect x="432" y="150" width="170" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="517" y="178" font-size="18" fill="#111827">candidate</text>
    <text x="517" y="204" font-size="20" fill="#111827">c_candidate</text>

    <rect x="262" y="270" width="220" height="62" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="372" y="295" font-size="18" fill="#111827">update gate</text>
    <text x="372" y="319" font-size="20" fill="#111827">gamma_u</text>

    <rect x="742" y="150" width="190" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="837" y="178" font-size="18" fill="#111827">new memory</text>
    <text x="837" y="204" font-size="20" fill="#111827">c_new</text>
  </g>

  <g stroke="#4b5563" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M252 185 C360 118 606 118 740 180"/>
    <path d="M602 185 L740 185"/>
    <path d="M482 300 C610 294 668 230 738 200"/>
  </g>

  <g font-family="Arial, sans-serif" fill="#111827">
    <rect x="292" y="104" width="480" height="68" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="312" y="132" font-size="18">c_new = gamma_u * c_candidate</text>
    <text x="312" y="156" font-size="18">        + (1 - gamma_u) * c_prev</text>
    <text x="102" y="258" font-size="16" fill="#2563eb">gamma_u near 0: keep this</text>
    <text x="530" y="258" font-size="16" fill="#d97706">gamma_u near 1: write this</text>
  </g>
</svg>
