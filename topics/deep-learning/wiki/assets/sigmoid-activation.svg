<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Sigmoid activation curve</title>
  <desc id="desc">Sigmoid smoothly maps inputs into values between zero and one.</desc>
  <rect width="760" height="420" fill="#ffffff"/>
  <line x1="80" y1="300" x2="690" y2="300" stroke="#111827" stroke-width="2"/>
  <line x1="380" y1="340" x2="380" y2="60" stroke="#111827" stroke-width="2"/>
  <line x1="90" y1="80" x2="680" y2="80" stroke="#9ca3af" stroke-width="2" stroke-dasharray="7 6"/>
  <line x1="90" y1="300" x2="680" y2="300" stroke="#9ca3af" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="696" y="306" font-family="Arial, sans-serif" font-size="18" fill="#111827">z</text>
  <text x="392" y="74" font-family="Arial, sans-serif" font-size="18" fill="#111827">phi(z)</text>
  <text x="58" y="86" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">1</text>
  <text x="58" y="306" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">0</text>
  <path d="M100 296 C210 296 280 240 340 205 C405 167 475 88 660 84" fill="none" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>
  <text x="105" y="252" font-family="Arial, sans-serif" font-size="18" fill="#6d28d9">saturates near 0</text>
  <text x="500" y="122" font-family="Arial, sans-serif" font-size="18" fill="#6d28d9">saturates near 1</text>
  <text x="250" y="376" font-family="Arial, sans-serif" font-size="22" fill="#111827">Sigmoid: 1 / (1 + exp(-z))</text>
</svg>
