<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">ReLU activation curve</title>
  <desc id="desc">ReLU is zero for negative inputs and linear for positive inputs.</desc>
  <rect width="760" height="420" fill="#ffffff"/>
  <line x1="80" y1="300" x2="690" y2="300" stroke="#111827" stroke-width="2"/>
  <line x1="380" y1="340" x2="380" y2="60" stroke="#111827" stroke-width="2"/>
  <text x="696" y="306" font-family="Arial, sans-serif" font-size="18" fill="#111827">z</text>
  <text x="392" y="74" font-family="Arial, sans-serif" font-size="18" fill="#111827">phi(z)</text>
  <polyline points="100,300 380,300 660,80" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="380" cy="300" r="6" fill="#2563eb"/>
  <text x="112" y="270" font-family="Arial, sans-serif" font-size="18" fill="#991b1b">negative inputs clipped to 0</text>
  <text x="462" y="142" font-family="Arial, sans-serif" font-size="18" fill="#1d4ed8">positive inputs pass through</text>
  <text x="285" y="376" font-family="Arial, sans-serif" font-size="22" fill="#111827">ReLU: max(0, z)</text>
</svg>
