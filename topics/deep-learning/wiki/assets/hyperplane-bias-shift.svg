<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Bias shifts a hyperplane</title>
  <desc id="desc">Three parallel hyperplanes with the same weight vector and different bias values, showing that bias changes offset while the weight vector keeps orientation fixed.</desc>
  <defs>
    <marker id="arrow-dark" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="760" height="420" fill="#ffffff" />
  <g transform="translate(90 330)">
    <line x1="0" y1="0" x2="590" y2="0" stroke="#111827" stroke-width="2" marker-end="url(#arrow-dark)" />
    <line x1="0" y1="0" x2="0" y2="-270" stroke="#111827" stroke-width="2" marker-end="url(#arrow-dark)" />
    <text x="600" y="6" font-family="Arial, sans-serif" font-size="18" fill="#111827">x1</text>
    <text x="-9" y="-286" font-family="Arial, sans-serif" font-size="18" fill="#111827">x2</text>

    <text x="24" y="-286" font-family="Arial, sans-serif" font-size="20" fill="#111827">Same w, different b</text>
    <text x="24" y="-258" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">Changing b shifts the hyperplane without changing its orientation.</text>

    <line x1="160" y1="24" x2="160" y2="-235" stroke="#dc2626" stroke-width="4" />
    <line x1="300" y1="24" x2="300" y2="-235" stroke="#111827" stroke-width="4" />
    <line x1="440" y1="24" x2="440" y2="-235" stroke="#2563eb" stroke-width="4" />

    <text x="112" y="-215" font-family="Arial, sans-serif" font-size="17" fill="#dc2626">b = +1</text>
    <text x="263" y="-215" font-family="Arial, sans-serif" font-size="17" fill="#111827">b = 0</text>
    <text x="392" y="-215" font-family="Arial, sans-serif" font-size="17" fill="#2563eb">b = -1</text>

    <text x="104" y="52" font-family="Arial, sans-serif" font-size="16" fill="#dc2626">x1 = -b / ||w||</text>
    <text x="249" y="52" font-family="Arial, sans-serif" font-size="16" fill="#111827">through origin</text>
    <text x="384" y="52" font-family="Arial, sans-serif" font-size="16" fill="#2563eb">x1 = -b / ||w||</text>

    <line x1="300" y1="-90" x2="395" y2="-90" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)" />
    <text x="340" y="-108" font-family="Arial, sans-serif" font-size="20" fill="#2563eb">w</text>

    <path d="M300 -76 C337 -62 397 -62 438 -76" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 5" />
    <text x="330" y="-43" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">bias shifts along the normal direction</text>

    <circle cx="300" cy="0" r="5" fill="#111827" />
    <text x="288" y="22" font-family="Arial, sans-serif" font-size="15" fill="#111827">0</text>
  </g>
</svg>
