<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Tanh activation curve</title>
  <desc id="desc">Tanh smoothly maps inputs into values between negative one and one.</desc>
  <rect width="760" height="420" fill="#ffffff"/>
  <line x1="80" y1="190" x2="690" y2="190" stroke="#111827" stroke-width="2"/>
  <line x1="380" y1="340" x2="380" y2="50" stroke="#111827" stroke-width="2"/>
  <line x1="90" y1="70" x2="680" y2="70" stroke="#9ca3af" stroke-width="2" stroke-dasharray="7 6"/>
  <line x1="90" y1="310" x2="680" y2="310" stroke="#9ca3af" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="696" y="196" font-family="Arial, sans-serif" font-size="18" fill="#111827">z</text>
  <text x="392" y="64" font-family="Arial, sans-serif" font-size="18" fill="#111827">phi(z)</text>
  <text x="58" y="76" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">1</text>
  <text x="50" y="316" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">-1</text>
  <path d="M100 306 C220 306 285 255 340 218 C405 172 470 78 660 74" fill="none" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
  <text x="95" y="266" font-family="Arial, sans-serif" font-size="18" fill="#047857">negative saturation</text>
  <text x="500" y="112" font-family="Arial, sans-serif" font-size="18" fill="#047857">positive saturation</text>
  <text x="305" y="376" font-family="Arial, sans-serif" font-size="22" fill="#111827">tanh(z)</text>
</svg>
