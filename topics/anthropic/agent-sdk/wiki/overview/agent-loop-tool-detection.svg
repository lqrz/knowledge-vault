<svg viewBox="0 0 900 1020" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Fira Code', monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1020" fill="#0F172A" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#F8FAFC" font-size="17" font-weight="bold" font-family="'Inter', 'Helvetica Neue', sans-serif">Agent Loop: How Tool Calls Are Detected</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748B" font-size="12" font-family="'Inter', 'Helvetica Neue', sans-serif">Claude Agent SDK — message types, content blocks, and values</text>

  <!-- ── STEP 1: query() call ── -->
  <rect x="300" y="78" width="300" height="52" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="450" y="99" text-anchor="middle" fill="#93C5FD" font-size="11" font-family="'Inter', sans-serif" font-weight="600">YOUR CODE</text>
  <text x="450" y="117" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="'SF Mono', monospace">query(prompt, options)</text>

  <!-- Arrow down -->
  <line x1="450" y1="130" x2="450" y2="155" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── STEP 2: SystemMessage ── -->
  <rect x="30" y="155" width="840" height="90" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="1.5"/>
  <rect x="30" y="155" width="200" height="90" rx="8" fill="#2D1B69" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="130" y="178" text-anchor="middle" fill="#C4B5FD" font-size="11" font-weight="600" font-family="'Inter', sans-serif">SystemMessage</text>
  <text x="130" y="196" text-anchor="middle" fill="#7C3AED" font-size="20">⬡</text>
  <text x="130" y="232" text-anchor="middle" fill="#A78BFA" font-size="10" font-family="'SF Mono', monospace">type: "system"</text>

  <text x="250" y="178" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  {</text>
  <text x="250" y="193" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">    type:    </text><text x="348" y="193" fill="#A78BFA" font-size="10" font-family="'SF Mono', monospace">"system"</text>
  <text x="250" y="208" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">    subtype: </text><text x="348" y="208" fill="#86EFAC" font-size="10" font-family="'SF Mono', monospace">"init"</text><text x="420" y="208" fill="#475569" font-size="10" font-family="'SF Mono', monospace">  // only valid value</text>
  <text x="250" y="223" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">    session_id: </text><text x="348" y="223" fill="#FCD34D" font-size="10" font-family="'SF Mono', monospace">"sess_abc123..."</text>
  <text x="250" y="234" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  }</text>

  <text x="855" y="205" text-anchor="end" fill="#475569" font-size="10" font-family="'Inter', sans-serif">emitted once at start</text>

  <!-- Arrow down -->
  <line x1="450" y1="245" x2="450" y2="268" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="261" fill="#475569" font-size="10" font-family="'Inter', sans-serif">Claude thinks...</text>

  <!-- ── STEP 3: AssistantMessage ── -->
  <rect x="30" y="268" width="840" height="178" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="30" y="268" width="200" height="178" rx="8" fill="#0C1A3A" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="130" y="292" text-anchor="middle" fill="#93C5FD" font-size="11" font-weight="600" font-family="'Inter', sans-serif">AssistantMessage</text>
  <text x="130" y="316" text-anchor="middle" fill="#2563EB" font-size="24">◆</text>
  <text x="130" y="430" text-anchor="middle" fill="#60A5FA" font-size="10" font-family="'SF Mono', monospace">type: "assistant"</text>

  <text x="250" y="292" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  {</text>
  <text x="250" y="307" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">    type:    </text><text x="348" y="307" fill="#60A5FA" font-size="10" font-family="'SF Mono', monospace">"assistant"</text>
  <text x="250" y="322" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">    message: </text><text x="348" y="322" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">{ role: </text><text x="420" y="322" fill="#86EFAC" font-size="10" font-family="'SF Mono', monospace">"assistant"</text><text x="498" y="322" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">, content: [</text>

  <!-- TextBlock sub-box -->
  <rect x="260" y="330" width="340" height="44" rx="4" fill="#0F2744" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="270" y="346" fill="#475569" font-size="9" font-family="'Inter', sans-serif" font-weight="600">TextBlock  (always present when Claude narrates)</text>
  <text x="270" y="361" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  { type: </text><text x="338" y="361" fill="#86EFAC" font-size="10" font-family="'SF Mono', monospace">"text"</text><text x="382" y="361" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">,  text: </text><text x="435" y="361" fill="#FCD34D" font-size="10" font-family="'SF Mono', monospace">"I'll read the file..."</text><text x="570" y="361" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace"> }</text>

  <!-- ToolUseBlock sub-box — highlighted -->
  <rect x="260" y="381" width="560" height="56" rx="4" fill="#1A2F1A" stroke="#10B981" stroke-width="1.5"/>
  <text x="270" y="397" fill="#34D399" font-size="9" font-family="'Inter', sans-serif" font-weight="700">ToolUseBlock  ← TOOL CALL DETECTED HERE</text>
  <text x="270" y="412" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  { type: </text><text x="338" y="412" fill="#86EFAC" font-size="10" font-family="'SF Mono', monospace">"tool_use"</text><text x="406" y="412" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">,  id: </text><text x="443" y="412" fill="#FCD34D" font-size="10" font-family="'SF Mono', monospace">"toolu_01XyZ..."</text><text x="547" y="412" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">, name: </text><text x="600" y="412" fill="#F87171" font-size="10" font-family="'SF Mono', monospace">"Read"</text>
  <text x="270" y="428" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">    input: </text><text x="330" y="428" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">{ file_path: </text><text x="415" y="428" fill="#FCD34D" font-size="10" font-family="'SF Mono', monospace">"/src/main.py"</text><text x="510" y="428" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace"> }   }</text>

  <text x="250" y="445" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">          ] }</text>
  <text x="250" y="456" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  }</text>

  <!-- Decision diamond -->
  <polygon points="450,476 530,508 450,540 370,508" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <text x="450" y="504" text-anchor="middle" fill="#FCD34D" font-size="10" font-family="'Inter', sans-serif" font-weight="600">any block</text>
  <text x="450" y="518" text-anchor="middle" fill="#FCD34D" font-size="10" font-family="'Inter', sans-serif" font-weight="600">type == "tool_use"?</text>

  <!-- NO branch → ResultMessage -->
  <line x1="370" y1="508" x2="100" y2="508" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="235" y="502" text-anchor="middle" fill="#EF4444" font-size="11" font-family="'Inter', sans-serif" font-weight="600">NO</text>

  <!-- YES branch → down -->
  <line x1="450" y1="540" x2="450" y2="560" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="460" y="555" fill="#10B981" font-size="11" font-family="'Inter', sans-serif" font-weight="600">YES</text>

  <!-- ── ResultMessage box (left, on NO branch) ── -->
  <rect x="30" y="540" width="270" height="165" rx="8" fill="#1E293B" stroke="#EF4444" stroke-width="1.5"/>
  <text x="165" y="563" text-anchor="middle" fill="#FCA5A5" font-size="11" font-weight="600" font-family="'Inter', sans-serif">ResultMessage</text>
  <text x="165" y="579" text-anchor="middle" fill="#DC2626" font-size="18">■</text>

  <text x="44" y="601" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">{</text>
  <text x="44" y="616" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  type:    </text><text x="120" y="616" fill="#F87171" font-size="10" font-family="'SF Mono', monospace">"result"</text>
  <text x="44" y="631" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  subtype: </text><text x="120" y="631" fill="#86EFAC" font-size="10" font-family="'SF Mono', monospace">"success"</text><text x="185" y="631" fill="#475569" font-size="10" font-family="'SF Mono', monospace">  // or...</text>
  <text x="44" y="646" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">           </text><text x="120" y="646" fill="#F87171" font-size="10" font-family="'SF Mono', monospace">"error"</text>
  <text x="44" y="661" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">           </text><text x="120" y="661" fill="#F87171" font-size="10" font-family="'SF Mono', monospace">"interrupted"</text>
  <text x="44" y="676" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  result:  </text><text x="120" y="676" fill="#FCD34D" font-size="10" font-family="'SF Mono', monospace">"Final answer text"</text>
  <text x="44" y="691" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  cost_usd: </text><text x="120" y="691" fill="#A78BFA" font-size="10" font-family="'SF Mono', monospace">0.0042</text>
  <text x="44" y="703" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">}</text>

  <!-- ── Tool Execution box ── -->
  <rect x="310" y="560" width="580" height="62" rx="8" fill="#1A1A2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="600" y="583" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="600" font-family="'Inter', sans-serif">TOOL EXECUTOR</text>
  <text x="600" y="603" text-anchor="middle" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">SDK runs the tool handler → collects output</text>
  <text x="600" y="617" text-anchor="middle" fill="#475569" font-size="10" font-family="'Inter', sans-serif">one execution per ToolUseBlock in the message</text>

  <!-- Arrow down from tool executor -->
  <line x1="600" y1="622" x2="600" y2="644" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── UserMessage (tool_result) ── -->
  <rect x="310" y="644" width="580" height="148" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="310" y="644" width="170" height="148" rx="8" fill="#2C1A00" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="395" y="668" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="600" font-family="'Inter', sans-serif">UserMessage</text>
  <text x="395" y="688" text-anchor="middle" fill="#D97706" font-size="22">◈</text>
  <text x="395" y="778" text-anchor="middle" fill="#FBBF24" font-size="10" font-family="'SF Mono', monospace">type: "user"</text>

  <text x="496" y="668" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  {</text>
  <text x="496" y="683" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">    type:    </text><text x="566" y="683" fill="#FBBF24" font-size="10" font-family="'SF Mono', monospace">"user"</text>
  <text x="496" y="698" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">    message: </text><text x="566" y="698" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">{ role: </text><text x="624" y="698" fill="#86EFAC" font-size="10" font-family="'SF Mono', monospace">"user"</text><text x="667" y="698" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">, content: [</text>

  <!-- ToolResultBlock sub-box -->
  <rect x="506" y="706" width="370" height="62" rx="4" fill="#1A1A00" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="516" y="722" fill="#FBBF24" font-size="9" font-family="'Inter', sans-serif" font-weight="600">ToolResultBlock</text>
  <text x="516" y="737" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  { type:        </text><text x="620" y="737" fill="#86EFAC" font-size="10" font-family="'SF Mono', monospace">"tool_result"</text>
  <text x="516" y="752" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">    tool_use_id: </text><text x="620" y="752" fill="#FCD34D" font-size="10" font-family="'SF Mono', monospace">"toolu_01XyZ..."</text><text x="730" y="752" fill="#475569" font-size="10" font-family="'SF Mono', monospace">← matches id</text>
  <text x="516" y="766" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">    content:     </text><text x="620" y="766" fill="#FCD34D" font-size="10" font-family="'SF Mono', monospace">[ { type: "text", text: "..." } ]</text>

  <text x="496" y="782" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">          ] }</text>
  <text x="496" y="793" fill="#94A3B8" font-size="10" font-family="'SF Mono', monospace">  }</text>

  <!-- Loop arrow back up -->
  <line x1="870" y1="716" x2="870" y2="282" stroke="#3B82F6" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="870" y1="282" x2="872" y2="282" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="883" y="570" fill="#3B82F6" font-size="11" font-family="'Inter', sans-serif" font-weight="600" transform="rotate(90 883 570)">loop back → Claude responds again</text>

  <!-- ── LEGEND ── -->
  <rect x="30" y="810" width="840" height="190" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="450" y="833" text-anchor="middle" fill="#94A3B8" font-size="12" font-weight="600" font-family="'Inter', sans-serif">Message Types Reference</text>

  <!-- Legend items row 1 -->
  <rect x="50" y="848" width="12" height="12" rx="2" fill="#2D1B69" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="68" y="859" fill="#C4B5FD" font-size="11" font-family="'Inter', sans-serif" font-weight="600">SystemMessage</text>
  <text x="68" y="873" fill="#64748B" font-size="10" font-family="'Inter', sans-serif">type="system", subtype="init" — emitted once at session start</text>

  <rect x="270" y="848" width="12" height="12" rx="2" fill="#0C1A3A" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="288" y="859" fill="#93C5FD" font-size="11" font-family="'Inter', sans-serif" font-weight="600">AssistantMessage</text>
  <text x="288" y="873" fill="#64748B" font-size="10" font-family="'Inter', sans-serif">type="assistant" — Claude's turn; content[] has TextBlock and/or ToolUseBlock(s)</text>

  <!-- Legend items row 2 -->
  <rect x="50" y="892" width="12" height="12" rx="2" fill="#2C1A00" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="68" y="903" fill="#FBBF24" font-size="11" font-family="'Inter', sans-serif" font-weight="600">UserMessage</text>
  <text x="68" y="917" fill="#64748B" font-size="10" font-family="'Inter', sans-serif">type="user" — SDK-injected tool results; content[] has ToolResultBlock(s)</text>

  <rect x="270" y="892" width="12" height="12" rx="2" fill="#1E293B" stroke="#EF4444" stroke-width="1.5"/>
  <text x="288" y="903" fill="#FCA5A5" font-size="11" font-family="'Inter', sans-serif" font-weight="600">ResultMessage</text>
  <text x="288" y="917" fill="#64748B" font-size="10" font-family="'Inter', sans-serif">type="result", subtype∈ {"success","error","interrupted"} — loop ends here</text>

  <!-- Legend row 3: content block types -->
  <text x="50" y="940" fill="#94A3B8" font-size="11" font-weight="600" font-family="'Inter', sans-serif">Content block types:</text>
  <rect x="50" y="950" width="840" height="38" rx="4" fill="#0F172A"/>

  <text x="62" y="966" fill="#86EFAC" font-size="10" font-family="'SF Mono', monospace">"text"</text>
  <text x="110" y="966" fill="#475569" font-size="10" font-family="'Inter', sans-serif">Claude narration or reply</text>

  <text x="280" y="966" fill="#86EFAC" font-size="10" font-family="'SF Mono', monospace">"tool_use"</text>
  <text x="348" y="966" fill="#475569" font-size="10" font-family="'Inter', sans-serif">tool call intent — carries id, name, input{}</text>

  <text x="580" y="966" fill="#86EFAC" font-size="10" font-family="'SF Mono', monospace">"tool_result"</text>
  <text x="658" y="966" fill="#475569" font-size="10" font-family="'Inter', sans-serif">SDK feeds result back — matched by tool_use_id</text>

  <text x="62" y="983" fill="#475569" font-size="10" font-family="'Inter', sans-serif">Python: isinstance(block, TextBlock) | ToolUseBlock    TypeScript: block.type === "text" | "tool_use" | "tool_result"</text>
</svg>
